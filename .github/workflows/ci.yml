name: CI

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpcs:
    name: PHPCS (WordPress Coding Standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCS
        run: composer run phpcs

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mysql:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=6
          --health-start-period=30s
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mysqli
          coverage: pcov
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install MySQL client (for bin/install-wp-tests.sh)
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Install WordPress test library
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 6.9.4

      - name: Run PHPUnit with coverage
        run: |
          ./vendor/bin/phpunit \
            --coverage-clover=clover.xml \
            --coverage-html=build/coverage-html

      - name: Enforce minimum coverage
        env:
          MIN: ${{ vars.PHP_COVERAGE_MIN }}
        run: ./vendor/bin/coverage-check clover.xml "${MIN:-35}"

      - name: Upload Clover to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clover.xml
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage
          path: |
            clover.xml
            build/coverage-html
